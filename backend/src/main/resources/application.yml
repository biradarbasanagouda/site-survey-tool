spring:
  application:
    name: site-survey-tool

  datasource:
    url: jdbc:mysql://localhost:3306/site_survey_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&createDatabaseIfNotExist=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080
  error:
    include-message: always

jwt:
  secret: sst-super-secret-jwt-key-change-in-production-2024-minimum-256-bits
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket-name: site-survey-files

logging:
  level:
    com.isp.sitesurvey: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
